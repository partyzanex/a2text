name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"
  # Mirror the CGO env Makefile sets so `go test` / `go vet` (driven by
  # golangci-lint) can compile the whisper-tagged files without us having to
  # re-derive the paths in each step.
  WHISPER_DIR: whisper.cpp

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake ffmpeg \
            libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev \
            libayatana-appindicator3-dev libgtk-3-dev \
            pipewire-bin pipewire-pulse \
            wl-clipboard xclip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache whisper.cpp build
        id: whisper-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.WHISPER_DIR }}/build
          key: whisper-${{ runner.os }}-${{ hashFiles('.gitmodules', 'whisper.cpp/CMakeLists.txt', 'whisper.cpp/ggml/CMakeLists.txt') }}

      - name: Run tests
        run: make test-ci

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        # golangci-lint analysis compiles non-whisper Go packages (Fyne is
        # CGo and needs X11/GL headers). The `whisper` build tag is NOT in
        # .golangci.yml build-tags, so the whisper.cpp libs are not needed
        # for lint — only test pulls them in.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev \
            libayatana-appindicator3-dev libgtk-3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Install golangci-lint via the upstream install script. The
      # golangci-lint-action insists on running `golangci-lint run` itself,
      # which prevents us from delegating to `make lint-ci`. Bare install
      # leaves the binary on PATH for the Makefile target to invoke.
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run lint
        run: make lint-ci
