// Secret subsystem of a2textd.
//
// The daemon owns a key-value store on disk (under /var/lib/a2textd/)
// and exposes it through this service. The store holds provider API
// keys and any other long-lived secrets the daemon itself needs at
// runtime.
//
// Storage protection is by access control, not by application-level
// encryption. The on-disk file is owned by a dedicated system user
// (a2textd:a2textd) with mode 0600; combined with systemd hardening
// directives on the unit (NoNewPrivileges, ProtectSystem, ProtectHome,
// PrivateTmp, dropped capabilities) this keeps the file unreadable to
// every non-root process on the machine. Disk-level encryption (LUKS)
// is the recommended OS-level mitigation against cold-disk theft and
// is assumed to be present on hostile-loss threat models. Application-
// level encryption-at-rest may be enabled per config later if a real
// requirement appears (compliance, untrusted-backup scenarios) — when
// it does the on-disk format changes but the wire contract here does
// not.
//
// Asymmetric API by design:
//   * Writes (Set) and metadata reads (List) are exposed.
//   * Plaintext reads are NOT — there is no Get RPC. The daemon reads
//     the value internally when an STT provider needs it; the UI must
//     keep its own copy if it wants to display the value back to the
//     user.
//   * Delete and rotate will be added with new RPCs when there is a
//     real reason.
//
// This minimises the IPC attack surface: a same-UID adversary that
// somehow obtains a valid mTLS client cert still cannot read stored
// keys back, only overwrite them.
syntax = "proto3";

package a2text.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/partyzanex/a2text/pkg/proto/a2text/v1;a2textv1";

// SecretService is the wire interface for the daemon-owned secret
// store. Every RPC is invoked under mTLS on the loopback gRPC
// channel.
service SecretService {
  // Set writes (or overwrites) the value bound to the given key. The
  // daemon persists the entry to its access-controlled storage and
  // returns the server-side store timestamp so the UI can show
  // "last updated".
  rpc Set(SetSecretRequest) returns (SetSecretResponse);

  // List returns metadata for every key currently present in the
  // store. Values are never returned — callers receive key names and
  // bookkeeping fields only.
  rpc List(ListSecretsRequest) returns (ListSecretsResponse);
}

// SetSecretRequest carries one key/value pair.
message SetSecretRequest {
  // logical key the value is bound to. Conventionally the provider
  // name ("openai", "deepgram") but free-form strings are accepted.
  string key = 1;

  // raw secret value. Bytes (not string) on the wire because real
  // secrets are not always valid UTF-8: PEM private keys, raw byte
  // tokens, OAuth refresh tokens with control characters all need
  // to round-trip safely. The daemon never echoes this back in any
  // subsequent RPC.
  bytes value = 2;
}

// SetSecretResponse acknowledges the write happened.
message SetSecretResponse {
  // server-side timestamp when the entry was written.
  google.protobuf.Timestamp store_time = 1;
}

// ListSecretsRequest is empty by design. Filter fields may be added
// later (prefix match, only-set-after, etc).
message ListSecretsRequest {
}

// ListSecretsResponse describes every key currently in the store.
message ListSecretsResponse {
  // one entry per key. Order is not guaranteed.
  repeated SecretMeta secrets = 1;
}

// SecretMeta describes one stored key without revealing its value.
message SecretMeta {
  // the logical key.
  string key = 1;

  // server-side timestamp when the current value was written.
  google.protobuf.Timestamp store_time = 2;
}
