provider: "whisper-cpp"
language: "ru"

go_whisper:
  # URL includes the full API base path. The legacy `prefix` field is
  # still accepted on load and merged into `url` for backward compatibility,
  # but new configs should leave it out.
  url: "http://localhost:9081/api/whisper"
  model: "ggml-large-v3-turbo"
  timeout: "10m"
  auto_download: true

# model_path is left blank on a fresh install. The daemon auto-downloads
# ggml-tiny.bin (~75MB) into whisper_cpp_models_dir on first run when
# provider is "whisper-cpp" and no model file is present, then writes
# the resulting path back here. tiny is rough on Russian but ships fast;
# override with an absolute .bin path to pin a heavier model
# (ggml-small.bin / ggml-large-v3-turbo.bin) once it's been downloaded
# via the settings UI.
model_path: ""
whisper_cpp_models_dir: ""

openai:
  api_key: ""
  base_url: ""
  model: "whisper-1"

deepgram:
  api_key: ""
  base_url: ""
  model: "nova-2"

temp_dir: ""
convert_timeout: "60s"
transcribe_timeout: "10m"

log_level: "debug"

capture:
  backend: "auto"
  sample_rate: 16000
  channels: 1
  max_duration: "60s"

output:
  mode: "clipboard"
  autopaste_command: "auto"

daemon:
  shutdown_grace_period: "15s"

hotkey:
  key: "R"
  modifiers: ["super"]
  mode: "toggle"

privacy:
  keep_audio: false
  log_transcript: false
