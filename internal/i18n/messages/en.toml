"help.openai_api_key" = "OpenAI API key. Stored in config.yaml."
"help.openai_base_url" = "Override base URL (compatible proxy). Empty = OpenAI default."
"help.openai_model" = "OpenAI transcription model (whisper-1, gpt-4o-transcribe, …)."
"help.deepgram_api_key" = "Deepgram API key. Stored in config.yaml."
"help.deepgram_base_url" = "Override Deepgram base URL. Empty = default."
"help.deepgram_model" = "Deepgram model (nova-2, nova-2-general, …)."
"label.deepgram_balance" = "Balance"
"help.deepgram_balance" = "Remaining credits on the Deepgram project. Requires an API key with billing:read scope. Subscription plans may return empty."
"label.deepgram_streaming" = "Live streaming"
"help.deepgram_streaming" = "When enabled, audio is streamed to Deepgram over WebSocket while you speak; transcription finals arrive incrementally and paste fires sooner. When disabled, the recorded file is uploaded after stop."
"balance.no_key" = "Enter API key"
"balance.loading" = "Loading…"
"balance.unavailable" = "Unavailable"
"balance.empty" = "No balance reported"
"balance.needs_scope" = "API key needs billing:read scope"
"help.retry_enabled" = "Retry STT calls on transient errors instead of failing immediately."
"help.retry_initial_delay" = "Initial pause before the first retry (e.g. 200ms)."
"help.retry_max_delay" = "Upper bound for the exponential backoff between retries."
"help.retry_max_attempts" = "How many times to retry before giving up. 0 = unlimited."
"help.capture_backend" = "Audio capture system: auto (pick by environment), pipewire or pulseaudio."
"help.sample_rate" = "Sample rate in Hz. Whisper expects 16000."
"help.channels" = "Number of capture channels. Whisper is mono — typically 1."
"help.max_duration" = "Hard limit on a single recording length (e.g. 60s). Exceeding it stops the recording."
"help.silence_threshold" = "Silence floor in dBFS. Recordings below this RMS skip STT entirely, avoiding hallucinations on empty audio."
"help.output_mode" = "Where to send the recognised text: stdout, clipboard, or clipboard + auto-paste into the focused window."
"help.autopaste_command" = "Auto-paste backend: auto (pick by environment), uinput (Wayland-friendly), wtype, ydotool, xdotool."
"help.restore_clipboard" = "Put the previous clipboard contents back after auto-paste fires. Only the primary MIME type (text or image) is preserved."
"help.hotkey_enabled" = "Enable the built-in global-hotkey handler. Disable if you wire shortcuts via the desktop environment instead."
"help.hotkey_key" = "Key that toggles or holds the recording (e.g. R, F4)."
"help.hotkey_modifiers" = "Comma-separated modifier list (super, ctrl, alt, shift)."
"help.hotkey_binding" = "Click the button and press the combo (e.g. Ctrl+Shift+R) to bind it. Esc cancels."
"help.hotkey_mode" = "toggle — press toggles recording; hold — record while pressed."
"help.hotkey_backend" = "auto — pick by environment (evdev on Wayland); x11 — XGrabKey; none — do not register."
"help.grace_period" = "Maximum time the daemon is allowed to drain on SIGTERM (e.g. 15s)."
"help.temp_dir" = "Where to write temporary WAV files between capture and STT. Empty = $TMPDIR."
"help.convert_timeout" = "Timeout for audio conversion to WAV before STT."
"help.transcribe_timeout" = "Timeout for a single STT call, retries included."
"help.log_level" = "Logging verbosity: debug, info, warn, error."
"help.log_transcript" = "Write recognised text to the log. WARNING: transcript contents will appear in your log files."
"help.keep_audio" = "Save a copy of every recording after a successful transcription. Useful for debugging and archival."
"help.keep_audio_dir" = "Where to save kept recordings. Empty = the working temp_dir (legacy behaviour)."
"help.keep_audio_format" = "Container for the saved file: WAV (lossless, big) or OGG/Vorbis (~6x smaller, perceptually identical for speech)."
"help.autostart_enabled" = "Creates an XDG autostart .desktop entry under ~/.config/autostart/ so the daemon launches on next graphical login (GNOME, KDE and other DEs)."

