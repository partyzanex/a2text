"help.retry_max_attempts" = "Сколько раз пробовать заново перед окончательным отказом. 0 = бесконечно."
"help.capture_backend" = "Какую звуковую систему использовать для записи: auto (выбирать само), pipewire или pulseaudio."
"help.sample_rate" = "Частота дискретизации в Гц. Whisper рассчитан на 16000."
"help.channels" = "Количество каналов записи. Whisper моно — обычно 1."
"help.max_duration" = "Жёсткий лимит длины одной записи (например 60s). Превышение прерывает запись."
"help.silence_threshold" = "Уровень тишины в dBFS. Если RMS записи ниже — STT не вызывается, чтобы избежать галлюцинаций на пустом аудио."
"help.output_mode" = "Куда отправить распознанный текст: stdout, буфер обмена или буфер с авто-вставкой в активное окно."
"help.autopaste_command" = "Какой инструмент использовать для авто-вставки: auto (выбор по среде), uinput (универсально для Wayland), wtype, ydotool, xdotool."
"help.restore_clipboard" = "После авто-вставки вернуть в буфер обмена то, что было до распознавания. Сохраняется только основной MIME-тип (текст или картинка)."
"help.hotkey_enabled" = "Включить встроенный обработчик глобального хоткея. Если выключено — нужен внешний обработчик (например GNOME shortcuts)."
