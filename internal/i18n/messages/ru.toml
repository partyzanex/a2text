"help.cloud_provider" = "Какое облако использовать: openai (Whisper API) или deepgram."
"help.cloud_api_key" = "API-ключ для облачного провайдера. Хранится в зашифрованном виде в config.yaml."
"help.cloud_base_url" = "Альтернативный базовый URL облачного API (если используется совместимый прокси). Пусто = дефолт провайдера."
"help.retry_enabled" = "Повторять запрос к STT при временной ошибке вместо мгновенного провала."
"help.retry_initial_delay" = "Начальная пауза перед первой повторной попыткой (например 200ms)."
