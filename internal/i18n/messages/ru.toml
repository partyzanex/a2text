"help.hotkey_modifiers" = "Список модификаторов через запятую (super, ctrl, alt, shift)."
"help.hotkey_binding" = "Нажмите кнопку и затем сочетание клавиш (например Ctrl+Shift+R) — оно запишется в конфиг. Esc отменяет."
