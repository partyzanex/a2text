"help.hotkey_backend" = "auto — выбрать само (на Wayland — evdev); x11 — XGrabKey; none — не регистрировать."
"help.socket_path" = "Путь к Unix-сокету для IPC с трей-клиентом. Пусто = по умолчанию в $XDG_RUNTIME_DIR. Изменение вступит в силу после перезапуска демона."
"help.grace_period" = "Максимальное время на корректное завершение демона при SIGTERM (например 15s)."
"help.temp_dir" = "Куда складывать временные WAV-файлы между записью и STT. Пусто = $TMPDIR."
"help.convert_timeout" = "Таймаут перекодирования аудио в WAV перед отправкой в STT."
"help.transcribe_timeout" = "Таймаут одного вызова STT, включая все ретраи."
"help.log_level" = "Уровень логирования: debug, info, warn, error."
"help.log_transcript" = "Писать распознанный текст в логи. ВНИМАНИЕ: содержимое транскрипций будет видно в журнале."
"help.keep_audio" = "Сохранять копию каждой записи после успешного распознавания. Полезно для отладки и архива."
"help.keep_audio_dir" = "Куда складывать сохранённые записи. Пусто = в рабочую папку temp_dir (как раньше)."
"help.keep_audio_format" = "Контейнер для сохранённого файла: WAV (без потерь, большой) или OGG/Vorbis (сжатие ~6×, для речи неотличимо)."

